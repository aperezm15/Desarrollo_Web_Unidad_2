<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${title}">Noticiero UDC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --udc-blue: #003366;
            --udc-yellow: #ffcc00;
        }
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background-color: var(--udc-blue) !important; border-bottom: 4px solid var(--udc-yellow); }
        .navbar-brand, .nav-link { color: white !important; font-weight: 500; }
        .btn-udc { background-color: var(--udc-yellow); color: var(--udc-blue); font-weight: bold; }
        .footer { background-color: var(--udc-blue); color: white; padding: 20px 0; margin-top: 50px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="/noticias">
            <i class="fa-solid fa-newspaper me-2"></i>NOTICIERO UDC
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item"><a class="nav-link" href="/noticias">Noticias</a></li>

                <li class="nav-item" th:if="${session.usuarioRol == 'PERIODISTA' or session.usuarioRol == 'ADMIN'}">
                    <a class="nav-link text-warning fw-semibold" href="/noticias/nuevo">Crear Noticia</a>
                </li>

                <li class="nav-item" th:if="${session.usuarioRol == 'ADMIN'}">
                    <a class="nav-link text-info fw-semibold" href="/usuarios"><i class="fa-solid fa-users-gear me-1"></i>Usuarios</a>
                </li>

                <li class="nav-item ms-lg-3" th:if="${session.usuarioLogueado == null}">
                    <a class="btn btn-udc btn-sm px-4 shadow-sm" href="/login">Iniciar Sesión</a>
                </li>

                <li class="nav-item ms-lg-3 d-flex align-items-center gap-2" th:if="${session.usuarioLogueado != null}">
                    <span class="badge bg-light text-dark py-2 px-3 border shadow-sm">
                        <i class="fa-solid fa-user me-1 text-primary"></i>
                        <span th:text="${session.usuarioLogueado.nombre.getValue()}">Usuario</span>
                        (<small class="fw-bold text-danger" th:text="${session.usuarioRol}"></small>)
                    </span>
                    <a class="btn btn-danger btn-sm" href="/logout" title="Cerrar Sesión">
                        <i class="fa-solid fa-power-off"></i>
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container my-5">
    <div th:replace="${content}">
    </div>
</div>

<footer class="footer text-center">
    <div class="container">
        <p class="mb-0">© 2026 Universidad de Cartagena - Facultad de Ingeniería</p>
        <small>Desarrollo de Software Web - Actividad Unidad 2</small>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
