<section>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold" style="color: #003366;">Noticias Recientes</h2>
        <a href="/noticias/nuevo" class="btn btn-primary shadow-sm">
            <i class="fa-solid fa-plus me-2"></i>Nueva Noticia
        </a>
    </div>

    <div class="row row-cols-1 row-cols-md-2 g-4">
        <div class="col" th:each="n : ${noticias}">
            <div class="card h-100 border-0 shadow-sm">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span class="badge bg-info text-dark" th:text="${n.categoria}">Categoría</span>
                        <small class="text-muted" th:text="${n.fecha}">31 Mayo, 2026</small>
                    </div>
                    <p class="card-text fw-semibold" th:text="${n.descripcion}">Descripción de la noticia...</p>

                    <div class="mt-3 d-flex justify-content-between align-items-center">
                        <small class="text-primary">
                            <i class="fa-solid fa-location-dot me-1"></i>
                            <span th:text="${n.ciudad + ', ' + n.pais}">Cartagena, Colombia</span>
                        </small>
                        <a th:href="@{/noticias/detalle/{id}(id=${n.id})}" class="btn btn-outline-secondary btn-sm">Ver más</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(noticias)}" class="alert alert-light text-center py-5 shadow-sm">
        <i class="fa-solid fa-face-frown mb-3 d-block fs-1 text-muted"></i>
        <p class="mb-0">Aún no hay noticias publicadas. ¡Sé el primero en informar!</p>
    </div>
</section>
