<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Usuario - UDC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0" th:text="${userDto.id == null ? 'Registrar Usuario' : 'Modificar Usuario'}">Formulario de Usuario</h3>
                </div>
                <div class="card-body">

                    <div th:if="${error != null}" class="alert alert-danger alert-dismissible fade show" role="alert">
                        <strong>¡Error de validación!:</strong> <span th:text="${error}">Mensaje de error</span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>

                    <form th:action="@{/usuarios/guardar}" th:object="${userDto}" method="post">

                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label for="nombre" class="form-label">Nombre Completo:</label>
                            <input type="text" id="nombre" th:field="*{nombre}" class="form-control" placeholder="Mínimo 3 caracteres" required>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">Correo Electrónico:</label>
                            <input type="text" id="email" th:field="*{email}" class="form-control" placeholder="ejemplo@correo.com" required>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Contraseña:</label>
                            <input type="password" id="password" th:field="*{password}" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label for="role" class="form-label">Rol del Usuario:</label>
                            <select id="role" th:field="*{role}" class="form-select">
                                <option value="LECTOR">Lector (Por defecto)</option>
                                <option value="PERIODISTA">Periodista</option>
                                <option value="ADMIN">Administrador</option>
                            </select>
                        </div>

                        <div class="mb-3" th:if="${userDto.id != null}">
                            <label for="status" class="form-label">Estado de la Cuenta:</label>
                            <select id="status" th:field="*{status}" class="form-select">
                                <option value="PENDIENTE">Pendiente</option>
                                <option value="ACTIVO">Activo</option>
                                <option value="INACTIVO">Inactivo</option>
                            </select>
                        </div>

                        <div class="d-flex justify-content-end gap-2">
                            <a th:href="@{/usuarios}" class="btn btn-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-success">Guardar Usuario</button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
