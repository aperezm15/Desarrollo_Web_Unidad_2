spring.application.name=udc

# ===================================================================
# CONFIGURACIÓN DEL SERVIDOR
# ===================================================================
server.port=8080

# Desactivar la caché de Thymeleaf para que los cambios en HTML se vean en vivo sin reiniciar
spring.thymeleaf.cache=false

# Desactivar el banner de Spring al arrancar (Opcional, limpia la consola)
spring.main.banner-mode=off

# ===================================================================
# CONFIGURACIÓN DE CONEXIÓN A MYSQL (Reemplaza con tus credenciales)
# ===================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/mi_base_de_datos?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# CONFIGURACIÓN DE JPA / HIBERNATE
# ===================================================================
# Dialecto moderno para MySQL (Compatible con versiones 5.7 u 8.0+)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ddl-auto=update: Crea o actualiza automáticamente las tablas de la BD basándose en tus clases @Entity de Java
spring.jpa.hibernate.ddl-auto=update

# Mostrar las sentencias SQL limpias y formateadas en la consola de IntelliJ para depurar
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUGe=off