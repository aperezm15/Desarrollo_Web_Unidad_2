$kind: http-request
name: Listar Noticias
method: GET
url: '{{baseUrl}}/api/noticias'
order: 1000
headers:
  - key: Accept
    value: application/json
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
      pm.test("Response is an array", function () {
          pm.expect(pm.response.json()).to.be.an("array");
      });
      pm.test("First item has required fields", function () {
          var json = pm.response.json();
          if (json.length > 0) {
              pm.expect(json[0]).to.have.property("id");
              pm.expect(json[0]).to.have.property("categoria");
              pm.expect(json[0]).to.have.property("pais");
              pm.expect(json[0]).to.have.property("descripcion");
          }
      });
